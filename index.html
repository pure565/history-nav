<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="历史研究导航页，按专题整理常用数据库、图书馆、工具和资源站点。">
  <title>小卷 | 历史研究导航</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">History Nav</p>
      <h1>小卷</h1>
      <p class="hero-copy">为历史研究整理的常用导航页，覆盖数据库、图书馆、工具站点和专题资源。</p>
      <label class="search-wrap" for="searchInput">
        <span class="search-label">搜索资源</span>
        <input id="searchInput" type="search" placeholder="输入关键词，例如 图书馆、清史、AI">
      </label>
    </div>
  </header>

  <main class="page-main">
    <div class="results-bar">
      <span id="resultCount">正在加载资源...</span>
    </div>
    <div id="categoryContainer"></div>
  </main>

  <footer class="page-footer">
    <p>© 2026 小卷</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
